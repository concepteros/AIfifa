<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小组赛 | FIFA World Cup 2026</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-portal-page="groups">
    <header class="portal-topbar">
      <a class="back-link" href="./index.html">返回主页面</a>
      <div>
        <p class="eyebrow">FIFA World Cup 2026</p>
        <h1>小组赛</h1>
      </div>
    </header>
    <main class="portal-main">
      <section class="portal-intro">
        <p class="eyebrow">Group Stage Live</p>
        <h2>即时比分、小组排名与对战图</h2>
        <p>赛事数据每 15 秒自动刷新。比赛开始后，这里会同步展示比分和关键事件。</p>
      </section>
      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">API-Football Live</p>
            <h3>当前小组赛即时情况</h3>
          </div>
          <span id="portalFootballUpdatedAt">正在连接赛事数据...</span>
        </div>
        <div id="portalLiveMatches" class="live-match-list"></div>
      </section>
      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Groups</p>
            <h3>十二个小组</h3>
          </div>
          <span>48 支参赛队伍</span>
        </div>
        <div id="portalGroups" class="portal-group-grid"></div>
      </section>
      <section class="panel bracket-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Tournament Map</p>
            <h3>世界杯对战图</h3>
          </div>
          <span id="portalBracketUpdatedAt"></span>
        </div>
        <div class="bracket-legend">
          <span><i class="legend-dot live"></i>进行中</span>
          <span><i class="legend-dot qualified"></i>晋级</span>
          <span><i class="legend-dot eliminated"></i>已淘汰</span>
        </div>
        <div class="bracket-scroll">
          <div id="portalBracketGrid" class="bracket-grid"></div>
        </div>
      </section>
    </main>
    <script src="./data.js"></script>
    <script src="./bracket.js"></script>
    <script src="./portal.js"></script>
  </body>
</html>
