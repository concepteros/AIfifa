<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小组赛 | FIFA World Cup 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-portal-page="groups">
    <header class="portal-topbar">
      <a class="back-link" href="./index.html">返回主页</a>
      <div>
        <p class="eyebrow">FIFA World Cup 2026</p>
        <h1>World<span>Cup</span></h1>
      </div>
    </header>
    <main class="portal-main">
      <section class="portal-intro">
        <p class="eyebrow">Group Stage Live</p>
        <h2>小组赛即时情况与完整赛程</h2>
        <p>小组赛赛程按北京时间展示。比赛开赛后，页面会同步显示比分、关键事件和小组动态。</p>
      </section>
      <section class="panel">
        <div class="section-heading">
          <div><p class="eyebrow">API-Football Live</p><h3>当前小组赛即时情况</h3></div>
          <span id="portalFootballUpdatedAt">等待开赛</span>
        </div>
        <div id="portalLiveMatches" class="live-match-list"></div>
      </section>
      <section class="panel">
        <div class="section-heading">
          <div><p class="eyebrow">Group Schedule</p><h3>世界杯小组赛赛程</h3></div>
          <span>北京时间 2026-06-12 至 2026-06-28</span>
        </div>
        <div id="portalGroupSchedule" class="group-schedule"></div>
      </section>
      <section class="panel">
        <div class="section-heading">
          <div><p class="eyebrow">Groups</p><h3>十二个小组</h3></div>
          <span>48 支参赛队伍</span>
        </div>
        <div id="portalGroups" class="portal-group-grid"></div>
      </section>
    </main>
    <script src="./data.js"></script>
    <script src="./portal.js"></script>
  </body>
</html>
